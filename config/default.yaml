# SignalForge Default Configuration

project:
  name: signalforge
  data_dir: ${HOME}/.signalforge/data
  cache_dir: ${HOME}/.signalforge/cache
  results_dir: ${HOME}/.signalforge/results

# Asset universe - define what you want signals for
assets:
  us_stocks:
    - AAPL
    - MSFT
    - NVDA
    - TSLA
    - GOOGL
    - AMZN
    - META
    - AMD
    - AVGO
    - TSM
  crypto:
    # Major
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    # DeFi
    - LINK/USDT
    - UNI/USDT
    - AAVE/USDT
    - MKR/USDT
    # Layer 2 / Alt L1
    - AVAX/USDT
    - DOT/USDT
    - MATIC/USDT
    - ARB/USDT
    - OP/USDT
    - SUI/USDT
    - SEI/USDT
    - TIA/USDT
    # AI tokens
    - FET/USDT
    - RNDR/USDT
    - TAO/USDT
    # Meme
    - DOGE/USDT
    - SHIB/USDT
    - PEPE/USDT
    - WIF/USDT
    - BONK/USDT
  futures:
    - ES=F    # S&P 500 E-mini
    - NQ=F    # Nasdaq 100 E-mini
    - GC=F    # Gold
    - CL=F    # Crude Oil
  options: []  # e.g. ["AAPL 2026-06-19 200 C", "NVDA 2026-06-19 150 P"]

# Data provider configuration
data:
  stocks:
    provider: yfinance
    interval: 1d        # 1m, 5m, 15m, 1h, 1d
    lookback_days: 730  # 2 years
  crypto:
    provider: ccxt
    exchange: gate
    interval: 1d
    lookback_days: 730
  futures:
    provider: yfinance
    interval: 1d
    lookback_days: 365
  options:
    provider: yfinance       # uses underlying OHLCV + option chain Greeks/IV
    interval: 1d
    lookback_days: 365       # for the underlying stock
    polygon_api_key: ""      # optional: set for historical options bars via Polygon.io

# Prediction engines
engines:
  kronos:
    enabled: false        # Disabled: no real Kronos model, fallback is weak linear regression
    model: "NeoQuasar/Kronos-base"
    tokenizer: "NeoQuasar/Kronos-Tokenizer-base"
    pred_len: 5
    lookback: 512
    temperature: 0.8
    top_p: 0.9
    sample_count: 20
    device: cuda

  qlib:
    enabled: false        # Requires Qlib data bundle (~2GB download). GBM engine covers this.
    model_type: lgbm      # lgbm, lstm, transformer
    features: alpha158
    label_horizon: 5      # 5-day return prediction

  chronos:
    enabled: false        # Disabled: chronos-forecasting SDK version mismatch with bolt models
    model: "amazon/chronos-bolt-base"
    pred_len: 5

  trading_agents:
    enabled: true         # Gemini-powered multi-analyst LLM analysis (called once for top N, not per-asset)
    llm_provider: gemini
    model: gemini-3-flash-preview   # Gemini 3 Flash (free tier, best cost/performance for trading analysis)
    temperature: 0.3

  lstm:
    enabled: true         # LSTM seq2seq trained on-the-fly on asset history
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    lookback: 60          # Input sequence length (bars)
    epochs: 50            # Training epochs per prediction
    lr: 0.001
    mc_samples: 20        # MC Dropout samples for confidence
    device: cuda

  gbm:
    enabled: true         # Gradient-boosted trees (LightGBM or sklearn fallback)
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    label_horizon: 5      # Forward return prediction period
    min_train_rows: 60

# Technical analysis
technical:
  support_resistance:
    method: pivot_cluster   # pivot_cluster, fibonacci, volume_profile
    lookback: 60
  indicators:
    - name: RSI
      period: 14
    - name: MACD
      fast: 12
      slow: 26
      signal: 9
    - name: BBands
      period: 20
      std: 2.0
    - name: ATR
      period: 14

# Signal ensemble weights (re-normalised on the fly for active engines)
# Disabled engines (kronos/qlib/chronos) get 0 weight — combiner re-normalises
ensemble:
  kronos_weight: 0.00
  qlib_weight: 0.00
  chronos_weight: 0.00
  agents_weight: 0.10
  technical_weight: 0.20
  lstm_weight: 0.35
  gbm_weight: 0.35

# Output settings
output:
  format: table           # table, json, csv
  include_rationale: true
  confidence_threshold: 0.3  # Min confidence to show signal
